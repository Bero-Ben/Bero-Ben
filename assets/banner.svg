<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Ben Jahn – Werkzeugbau, digital gedacht.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#364856"/>
      <stop offset="100%" stop-color="#1A2128"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Schiefergrau-Hintergrund -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#vignette)"/>

  <!-- dezentes Raster -->
  <g stroke="#8FA3B0" stroke-opacity="0.06" stroke-width="1">
    <line x1="0"   y1="60"  x2="1280" y2="60"/>
    <line x1="0"   y1="300" x2="1280" y2="300"/>
    <line x1="80"  y1="0"   x2="80"   y2="360"/>
    <line x1="1200" y1="0"  x2="1200" y2="360"/>
  </g>

  <!-- Eyebrow -->
  <text x="100" y="100"
        font-family="'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#8FA3B0" font-weight="500"
        letter-spacing="4.5" text-anchor="start">
    BEN&#160;·&#160;JAHN
  </text>

  <!-- Wortmarke: Ben (regular) · Jahn (bold) -->
  <text x="100" y="200"
        font-family="'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="96" fill="#FAF8F4"
        letter-spacing="-3">
    <tspan font-weight="300">Ben&#160;</tspan><tspan font-weight="700">Jahn</tspan>
  </text>

  <!-- Trennlinie -->
  <line x1="100" y1="232" x2="260" y2="232" stroke="#4D6577" stroke-width="3"/>

  <!-- Slogan -->
  <text x="100" y="280"
        font-family="'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#F4F2EE" font-weight="400"
        letter-spacing="0.3">
    Werkzeugbau, digital gedacht.
  </text>

  <!-- Mono-Tag rechts -->
  <text x="1180" y="280"
        font-family="'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="13" fill="#8FA3B0" font-weight="400"
        letter-spacing="1.2" text-anchor="end">
    /github.com/Bero-Ben
  </text>

  <!-- Akzent-Linie unten -->
  <rect x="0" y="356" width="1280" height="4" fill="#4D6577"/>
</svg>
